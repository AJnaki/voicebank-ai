services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voicebank
      POSTGRES_PASSWORD: voicebank
      POSTGRES_DB: voicebank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://voicebank:voicebank@postgres:5432/voicebank
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
